version: "3.8"

services:
  # Database
  postgres:
    image: postgres:15-alpine
    container_name: identity-forge-postgres
    environment:
      POSTGRES_DB: identity_forge
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts:/docker-entrypoint-initdb.d/
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - identity-forge-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: identity-forge-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass redis_password
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis_password", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - identity-forge-network

  # Mailhog
  mailhog:
    image: mailhog/mailhog
    container_name: identity-forge-mailhog
    ports:
      - "1025:1025"  # SMTP server port
      - "8025:8025"  # Web UI port
    networks:
      - identity-forge-network
    restart: unless-stopped

  # API Application
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    container_name: identity-forge-api
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://postgres:password@postgres:5432/identity_forge
      REDIS_URL: redis://:redis_password@redis:6379
      JWT_SECRET: your-super-secret-jwt-key-at-least-32-characters-long
      JWT_EXPIRY: "900"
      SESSION_SECRET: your-super-secret-session-key-at-least-32-characters-long
      CORS_ORIGIN: http://localhost:3000,http://localhost:3001
      FRONTEND_URL: http://localhost:3000
      SMTP_HOST: mailhog
      SMTP_PORT: "1025"
      SMTP_USER: user
      SMTP_PASS: password
      SMTP_FROM: noreply@localhost
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/api:/app/apps/api
      - ./packages:/app/packages
      - ./jest.config.js:/app/jest.config.js
      - ./babel.config.ts:/app/babel.config.ts
      - ./tsconfig.json:/app/tsconfig.json
      - /app/node_modules
    networks:
      - identity-forge-network
    restart: unless-stopped
    command: ["node", "-r", "module-alias/register", "./dist/apps/api/server.js"]

volumes:
  postgres_data:
  redis_data:

networks:
  identity-forge-network:
    driver: bridge
