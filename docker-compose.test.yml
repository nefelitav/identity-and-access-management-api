version: "3.8"

services:
  postgres-test:
    image: postgres:15-alpine
    container_name: identity-forge-postgres-test
    environment:
      POSTGRES_DB: identity_forge_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: test_password
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data # Use tmpfs for speed
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 2s
      retries: 10

  redis-test:
    image: redis:7-alpine
    container_name: identity-forge-redis-test
    ports:
      - "6380:6379"
    command: redis-server --appendonly no --save "" --stop-writes-on-bgsave-error no
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 2s
      retries: 10

